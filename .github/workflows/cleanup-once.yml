name: cleanup-once
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  sweep:
    if: contains(github.event.head_commit.message, 'CLEANUP_DIAGNOSE_BRANCHES')
    runs-on: ubuntu-latest
    steps:
      - name: Delete claude/diagnose-* leftovers via REST
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          for b in claude/diagnose-workflow-marker claude/diagnose-workflow-marker-v2; do
            echo "Deleting $b..."
            curl -sS -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/git/refs/heads/$b" \
              -w "  HTTP %{http_code}\n" || echo "  (failed; continuing)"
          done
